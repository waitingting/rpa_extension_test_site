<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deep Cross Origin B</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #eef6ff;
      color: #17202a;
    }
    section {
      margin: 12px;
      padding: 14px;
      border: 2px solid #2b6cb0;
      border-radius: 8px;
      background: #ffffff;
    }
    label {
      display: grid;
      gap: 4px;
      margin: 10px 0;
    }
    input,
    textarea,
    button {
      font: inherit;
      border: 1px solid #2b6cb0;
      border-radius: 6px;
      padding: 7px 9px;
    }
  </style>
</head>
<body>
  <section>
    <h1 id="deep-cross-title">Deep Cross Origin B</h1>
    <p>Served from http://127.0.0.1:8009 inside a frame hosted by 127.0.0.1:8008.</p>
    <label>Deep input <input id="deep-cross-input" value="deep cross origin"></label>
    <label>Deep textarea <textarea id="deep-cross-textarea">Deep frame textarea</textarea></label>
    <button id="deep-cross-button" type="button">Deep Cross Button</button>
    <div id="deep-cross-marker" data-dgid="101">Deep frame pre-existing data-dgid</div>
  </section>
</body>
</html>
